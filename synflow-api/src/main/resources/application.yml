server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:synflow}
    username: ${DB_USERNAME:synflow}
    password: ${DB_PASSWORD:synflow}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  cache:
    type: redis
    redis:
      time-to-live: 600000

  jackson:
    serialization:
      write-dates-as-timestamps: false

app:
  jwt:
    secret: ${JWT_SECRET:mySuperSecretKeyForJWTThatIsAtLeast256BitsLongEnough2024}
    expiration-ms: 86400000

  encryption:
    secret-key: ${ENCRYPTION_KEY:AES256SecretKeyForSynFlowApp2024!}

  openai:
    api-key: ${OPENAI_API_KEY:sk-placeholder}
    model: gpt-4o
    base-url: https://api.openai.com

  aws:
    s3:
      bucket: ${AWS_S3_BUCKET:synflow-uploads}
      region: ${AWS_REGION:us-east-1}
      access-key: ${AWS_ACCESS_KEY:}
      secret-key: ${AWS_SECRET_KEY:}

  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000}
